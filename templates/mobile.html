<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Scan note</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; }
  body {
    background: #0d1622; color: #e7edf5;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    display: flex; flex-direction: column;
  }
  .topbar { padding: .6rem 1rem; text-align: center; font-weight: 700; background: #0a1019; }
  .topbar small { display: block; font-weight: 400; color: #9fb0c4; font-size: .8rem; }

  .stage {
    flex: 1; position: relative; overflow: hidden;
    display: flex; align-items: center; justify-content: center; background: #000;
  }
  video, #shot {
    width: 100%; height: 100%; object-fit: cover;
  }
  #shot { display: none; }

  .controls {
    padding: 1rem; display: flex; align-items: center; justify-content: center; gap: 1.5rem;
    background: #0a1019;
  }
  .shutter {
    width: 74px; height: 74px; border-radius: 50%; border: 5px solid #fff;
    background: #fff; cursor: pointer; flex-shrink: 0;
  }
  .shutter:active { transform: scale(.92); }
  .txtbtn {
    background: none; border: 0; color: #cfe0f2; font-size: 1rem; cursor: pointer;
    padding: .6rem; font-weight: 600;
  }

  #msg { text-align: center; padding: .6rem 1rem; min-height: 1.4rem; font-weight: 600; }
  #msg.err { color: #f87171; }
  #msg.ok { color: #4ade80; }

  .done {
    position: absolute; inset: 0; background: #0d1622; display: none;
    flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 2rem;
  }
  .done.show { display: flex; }
  .done .check { font-size: 4rem; }
  .done h2 { margin: .5rem 0 0; }
  .done p { color: #9fb0c4; }
</style>
</head>
<body>
  <div class="topbar">Capture handwritten note<small>Frame the page, then tap the shutter</small></div>

  <div class="stage">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="shot"></canvas>
    <div class="done" id="done">
      <div class="check">✅</div>
      <h2>Sent</h2>
      <p>Check the computer screen.</p>
    </div>
  </div>

  <div id="msg"></div>

  <div class="controls" id="controls">
    <button class="shutter" id="shutter" aria-label="Take photo"></button>
  </div>

<script>
const sessionId = "{{ session_id }}";
const video = document.getElementById('video');
const canvas = document.getElementById('shot');
const shutter = document.getElementById('shutter');
const msg = document.getElementById('msg');
const done = document.getElementById('done');
const controls = document.getElementById('controls');
let stream = null;

function say(text, cls) { msg.className = cls || ''; msg.textContent = text; }

async function startCamera() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    say('Camera not available in this browser.', 'err');
    return;
  }
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 } },
      audio: false,
    });
    video.srcObject = stream;
    await video.play();
    say('');
  } catch (e) {
    say('Could not open camera: ' + (e.message || e.name) + '. Allow camera access and reload.', 'err');
  }
}

async function capture() {
  if (!stream) { startCamera(); return; }
  const w = video.videoWidth, h = video.videoHeight;
  if (!w || !h) { say('Camera still warming up — try again.', 'err'); return; }

  // Freeze the current frame onto the canvas (no photo saved to the phone).
  canvas.width = w; canvas.height = h;
  canvas.getContext('2d').drawImage(video, 0, 0, w, h);
  video.style.display = 'none';
  canvas.style.display = 'block';
  shutter.disabled = true;
  say('Sending…');

  canvas.toBlob(async (blob) => {
    if (!blob) { say('Capture failed — try again.', 'err'); resetToLive(); return; }
    const body = new FormData();
    body.append('image', blob, 'note.jpg');
    try {
      const r = await fetch('/api/scan/session/' + sessionId + '/upload', { method: 'POST', body });
      if (!r.ok) { const d = await r.json().catch(() => ({})); throw new Error(d.detail || 'upload failed'); }
      // Stop the camera and show confirmation.
      if (stream) stream.getTracks().forEach(t => t.stop());
      controls.style.display = 'none';
      say('');
      done.classList.add('show');
    } catch (e) {
      say('Error: ' + e.message, 'err');
      resetToLive();
    }
  }, 'image/jpeg', 0.92);
}

function resetToLive() {
  canvas.style.display = 'none';
  video.style.display = 'block';
  shutter.disabled = false;
}

shutter.addEventListener('click', capture);
startCamera();
</script>
</body>
</html>
